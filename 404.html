<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Signal Lost | North West Atlas B Corp</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,300;1,300&family=Playfair+Display:wght@200;300&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #C5A059;
            --gold-light: #E8D5B5;
            --gold-dim: #8B6F4C;
            --gold-rgb: 197, 160, 89;
            --void: #060607;
            --ink-1: #EDE9E3;
            --ink-2: #9AA2B0;
            --ink-3: #6B7280;
            --ink-4: #4B5060;
            --serif: 'EB Garamond', Georgia, serif;
            --display: 'Playfair Display', Georgia, serif;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --ease: cubic-bezier(.16,1,.3,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            background: var(--void);
            color: var(--ink-2);
            font-family: var(--sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background: rgba(var(--gold-rgb),.14);
            color: var(--ink-1);
        }

        /* Grain */
        .noise {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            opacity: .028;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            animation: grainShift 0.5s steps(1) infinite;
        }
        @keyframes grainShift {
            0%   { transform: translate(0, 0); }
            10%  { transform: translate(-3%, -4%); }
            20%  { transform: translate(4%, 2%); }
            30%  { transform: translate(-2%, 5%); }
            40%  { transform: translate(3%, -3%); }
            50%  { transform: translate(-4%, 4%); }
            60%  { transform: translate(2%, -2%); }
            70%  { transform: translate(-3%, 3%); }
            80%  { transform: translate(4%, -4%); }
            90%  { transform: translate(-2%, 2%); }
            100% { transform: translate(3%, -3%); }
        }

        /* Layout */
        main {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 560px;
        }

        /* Error Code */
        .error-code {
            font-family: var(--display);
            font-size: clamp(8rem, 20vw, 14rem);
            font-weight: 200;
            line-height: 0.85;
            letter-spacing: -0.04em;
            background: linear-gradient(
                105deg,
                #F4EBD9 0%,
                var(--gold) 40%,
                var(--gold-light) 50%,
                var(--gold) 60%,
                var(--gold-dim) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.8s var(--ease) 0.2s forwards;
            filter: drop-shadow(0 0 60px rgba(var(--gold-rgb), 0.08));
            font-feature-settings: 'tnum' 1, 'lnum' 1;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Separator */
        .error-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 2rem auto;
            opacity: 0;
            animation: fadeUp 1.8s var(--ease) 0.5s forwards;
        }

        /* Subtitle */
        .error-sub {
            font-family: var(--sans);
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 1.8s var(--ease) 0.6s forwards;
        }

        /* Description */
        .error-desc {
            font-family: var(--serif);
            font-size: 1.15rem;
            font-style: italic;
            font-weight: 300;
            color: var(--ink-3);
            line-height: 1.8;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeUp 1.8s var(--ease) 0.8s forwards;
        }

        /* CTA Button */
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: .8rem;
            text-decoration: none;
            font-family: var(--sans);
            font-size: 0.6rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            padding: 1rem 2.5rem;
            border: 1px solid rgba(var(--gold-rgb), 0.2);
            border-radius: 2px;
            background: rgba(var(--gold-rgb), 0.03);
            backdrop-filter: blur(16px);
            transition: all 0.6s var(--ease);
            opacity: 0;
            animation: fadeUp 1.8s var(--ease) 1s forwards;
        }

        .error-btn:hover {
            border-color: rgba(var(--gold-rgb), 0.5);
            background: rgba(var(--gold-rgb), 0.06);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(var(--gold-rgb), 0.08);
        }

        .error-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            transition: transform 0.5s var(--ease);
        }

        .error-btn:hover svg {
            transform: translateX(-4px);
        }

        /* Secondary Nav */
        .error-nav {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: 2.5rem;
            opacity: 0;
            animation: fadeUp 1.8s var(--ease) 1.15s forwards;
        }

        .error-nav a {
            font-family: var(--sans);
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--ink-4);
            text-decoration: none;
            transition: color 0.5s var(--ease);
            position: relative;
        }

        .error-nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: width 0.5s var(--ease);
            opacity: 0.4;
        }

        .error-nav a:hover {
            color: var(--ink-2);
        }

        .error-nav a:hover::after {
            width: 100%;
        }

        /* Coords (Institutional aesthetic) */
        .error-coords {
            position: fixed;
            bottom: 2rem;
            left: 2.5rem;
            font-family: var(--sans);
            font-size: 0.42rem;
            letter-spacing: 0.55em;
            text-transform: uppercase;
            color: var(--ink-4);
            opacity: 0.12;
            transform: rotate(-90deg) translateX(-50%);
            transform-origin: left;
            pointer-events: none;
            z-index: 0;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .noise { animation: none; }
            .error-code, .error-line, .error-sub, .error-desc, .error-btn, .error-nav {
                opacity: 1;
                transform: none;
                animation: none;
            }
        }

        @media (max-width: 480px) {
            .error-nav {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="noise" aria-hidden="true"></div>

    <main role="alert">
        <div class="container">
            <div class="error-code" aria-hidden="true">404</div>
            <div class="error-line" aria-hidden="true"></div>
            <div class="error-sub">Signal lost in transit</div>
            <p class="error-desc">
                The institutional resource you are looking for does not exist, 
                has been relocated, or is classified beyond your clearance level.
            </p>
            <a href="index.html" class="error-btn">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5m7-7l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Return to Terminal
            </a>
            <div class="error-nav">
                <a href="Toolkit.html">Toolkit</a>
                <a href="disclosures.html">Disclosures</a>
            </div>
        </div>
    </main>

    <div class="error-coords" aria-hidden="true">
        25.3462° N · 55.4209° E · SHARJAH · UAE
    </div>

</body>
</html>
